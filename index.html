<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報告メール</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #e9eef3;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 14px;
}

.app {
  width: 100%;
  max-width: 760px;
}

.mail {
  background: white;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  overflow: hidden;
  transition: 0.6s;
}

.mail.sending {
  transform: translateY(-18px);
  opacity: 0.45;
}

.header {
  background: #2f3542;
  color: white;
  padding: 14px 18px;
  font-weight: bold;
}

.row {
  display: flex;
  padding: 12px 18px;
  border-bottom: 1px solid #ddd;
}

.label {
  width: 80px;
  color: #777;
}

textarea {
  width: 100%;
  height: 300px;
  padding: 22px;
  font-size: 16px;
  line-height: 1.7;
  border: none;
  resize: none;
  outline: none;
  font-family: inherit;
  background: white;
  box-sizing: border-box;
}

.footer {
  background: #f1f2f6;
  padding: 14px 18px;
  text-align: right;
}

button {
  background: #494B9D;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 28px;
  font-size: 15px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.7;
  cursor: default;
}

.status {
  display: none;
  margin-top: 16px;
  text-align: center;
  color: #555;
}

.notification {
  display: none;
  margin-top: 20px;
  background: white;
  padding: 16px 18px;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  cursor: pointer;
  animation: fadeIn 0.5s;
}

.reply {
  display: none;
  margin-top: 20px;
  background: white;
  border-left: 6px solid #2f3542;
  padding: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  animation: fadeIn 0.5s;
}

.reply-title {
  font-weight: bold;
  margin-bottom: 10px;
  line-height: 1.6;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 600px) {
  body {
    align-items: flex-start;
  }

  .row {
    padding: 12px 16px;
  }

  textarea {
    height: 330px;
    padding: 16px;
    font-size: 15px;
  }

  button {
    width: 100%;
    padding: 13px;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="mail" id="mailBox">
    <div class="header">「春野鏡子失踪事件」報告メール</div>

    <div class="row">
      <div class="label">To</div>
      <div>N.F@koreha.fiction.da</div>
    </div>

    <div class="row">
      <div class="label">Subject</div>
      <div>「春野鏡子失踪事件」報告メール</div>
    </div>

    <textarea id="answer" placeholder="ここに報告内容を入力してください"></textarea>

    <div class="footer">
      <button id="sendButton" onclick="sendMail()">送信</button>
    </div>
  </div>

  <div id="status" class="status">送信中...</div>

  <div id="notification" class="notification" onclick="openReply()">
    📩 新着メール 1件<br>
    <strong>From: N.F@koreha.fiction.da</strong>
  </div>

  <div id="reply" class="reply">
    <div class="reply-title">
      From: N.F@koreha.fiction.da<br>
      Subject: RE: 「春野鏡子失踪事件」報告メール
    </div>
    <div id="replyText"></div>
  </div>

</div>

<script>
let replyMessage = "";

function sendMail() {
  const input = document.getElementById("answer").value.trim();

  const answers = [
    "みたえき",
    "三田駅",
    "MITAEKI",
    "mitaeki"
  ];

  const correct = answers.some(answer =>
    input.includes(answer)
  );

  const mailBox = document.getElementById("mailBox");
  const button = document.getElementById("sendButton");
  const status = document.getElementById("status");
  const notification = document.getElementById("notification");
  const reply = document.getElementById("reply");

  button.disabled = true;
  button.textContent = "送信中...";
  mailBox.classList.add("sending");

  notification.style.display = "none";
  reply.style.display = "none";
  status.style.display = "block";
  status.textContent = "送信中...";

  setTimeout(() => {
    button.textContent = "✓ 送信済み";
    status.textContent = "送信済み";
  }, 1200);

  setTimeout(() => {
    status.style.display = "none";
    notification.style.display = "block";

    if (correct) {
      replyMessage =
        "ありがとう。<br><br>" +
        "「三田駅」に向えばいいのか。<br>" +
        "君は優秀な助手だな。<br><br>" +
        "次もよろしく頼むよ。";
    } else {
      replyMessage =
        "ふむ…<br><br>" +
        "どうも条件が合わないようだ。<br>" +
        "もう一度確認してほしい。";
    }
  }, 2800);
}

function openReply() {
  const notification = document.getElementById("notification");
  const reply = document.getElementById("reply");
  const replyText = document.getElementById("replyText");

  notification.style.display = "none";
  reply.style.display = "block";
  replyText.innerHTML = "";

  let i = 0;

  const typing = setInterval(() => {
    replyText.innerHTML = replyMessage.slice(0, i);
    i++;

    if (i > replyMessage.length) {
      clearInterval(typing);
    }
  }, 25);
}
</script>

</body>
</html>
