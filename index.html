<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
body{
    background:#f0f2f5;
    font-family:sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.mail{
    width:600px;
    background:white;
    border:1px solid #ccc;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
    background:#e9ecef;
    padding:10px;
    font-weight:bold;
}

.row{
    padding:10px;
    border-bottom:1px solid #ddd;
}

textarea{
    width:100%;
    height:200px;
    border:none;
    resize:none;
    padding:10px;
    box-sizing:border-box;
}

.footer{
    padding:10px;
    text-align:right;
}

button{
    padding:8px 20px;
}

#result{
    text-align:center;
    font-size:20px;
    margin-top:20px;
}
</style>
</head>

<body>

<div>
    <div class="mail">

        <div class="header">
            新規メッセージ
        </div>

        <div class="row">
            To: F.K@THIgame.fiction.com
        </div>

        <div class="row">
            Subject: 報告書
        </div>

        <textarea id="answer"
        placeholder="報告内容を入力してください"></textarea>

        <div class="footer">
            <button onclick="checkAnswer()">送信</button>
        </div>

    </div>

    <div id="result"></div>
</div>

<script>
function checkAnswer(){

    const input =
    document.getElementById("answer")
    .value
    .trim();

    const answers = [
        "みたえき",
        "三田駅",
        "MITAEKI",
        "mitaeki"
    ];

    const correct =
    answers.some(answer =>
        input.includes(answer)
    );

    if(correct){
        document.getElementById("result").innerHTML =
        "送信完了<br>報告を受理しました。";
    }
    else{
        document.getElementById("result").innerHTML =
        "送信失敗<br>報告内容を確認できません。";
    }
}
</script>

</body>
</html>
