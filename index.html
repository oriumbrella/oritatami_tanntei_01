<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報告メール</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #e9eef3;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 100%;
  max-width: 760px;
}

.mail {
  background: white;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  overflow: hidden;
}

.header {
  background: #2f3542;
  color: white;
  padding: 14px 18px;
  font-weight: bold;
}

.row {
  display: flex;
  padding: 12px 18px;
  border-bottom: 1px solid #ddd;
}

.label {
  width: 80px;
  color: #777;
}

textarea {
  width: 100%;
  height: 300px;
  padding: 22px;
  font-size: 16px;
  line-height: 1.7;
  resize: none;
  outline: none;
  font-family: inherit;
}

.footer {
  background: #f1f2f6;
  padding: 14px 18px;
  text-align: right;
}

button {
  background: #1e90ff;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 28px;
  font-size: 15px;
  cursor: pointer;
}

.reply {
  display: none;
  margin-top: 20px;
  background: white;
  border-left: 6px solid #2f3542;
  padding: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.reply-title {
  font-weight: bold;
  margin-bottom: 10px;
  line-height: 1.6;
}

.loading {
  display: none;
  margin-top: 16px;
  text-align: center;
  color: #555;
}
  @media (max-width: 600px) {

  body {
    padding: 14px;
    align-items: flex-start;
  }

  .row {
    padding: 12px 16px;
  }

  textarea {
    height: 330px;
    padding: 16px;
    font-size: 15px;
  }

  button {
    width: 100%;
    padding: 13px;
  }

}
</style>
</head>

<body>

<div class="app">

  <div class="mail">
    <div class="header">「春野鏡子失踪事件」報告メール</div>

    <div class="row">
      <div class="label">To</div>
      <div>N.F@koreha.fiction.da</div>
    </div>

    <div class="row">
      <div class="label">Subject</div>
      <div>「春野鏡子失踪事件」報告メール</div>
    </div>

    <textarea id="answer" placeholder="ここに報告内容を入力してください"></textarea>

    <div class="footer">
      <button onclick="sendMail()">送信</button>
    </div>
  </div>

  <div id="loading" class="loading">送信中...</div>

  <div id="reply" class="reply">
    <div class="reply-title">
      From: N.F@koreha.fiction.da<br>
      Subject: RE: 「春野鏡子失踪事件」報告メール
    </div>
    <div id="replyText"></div>
  </div>

</div>

<script>
function sendMail() {
  const input = document.getElementById("answer").value.trim();

    const answers = [
        "みたえき",
        "三田駅",
        "MITAEKI",
        "mitaeki"
    ];

  const correct = answers.some(answer =>
    input.includes(answer)
  );

  document.getElementById("reply").style.display = "none";
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("reply").style.display = "block";

    if (correct) {
      document.getElementById("replyText").innerHTML =
        "ありがとう。<br><br>" +
        "「三田駅」に向えばいいのか。<br>" +
        "君は優秀な助手だな<br><br>" +
        "次もよろしく頼むよ</strong>";
    } else {
      document.getElementById("replyText").innerHTML =
        "ふむ…<br><br>" +
        "どうも条件が合わないようだ<br>" +
        "もう一度確認してほしい";
    }
  }, 2000);
}
</script>

</body>
</html>
